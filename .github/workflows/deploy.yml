name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2244
          script: |
            set -e

            cd /root/Vpa-pilot-backend

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing backend dependencies..."
            source backend/env/bin/activate
            pip install -r backend/requirements.txt

            echo "==> Building frontend..."
            cd "PA portal/frontend"
            npm ci --prefer-offline
            npm run build
            cd /root/Vpa-pilot-backend

            echo "==> Restarting services..."
            systemctl restart vpa-backend
            systemctl restart vpa-frontend

            echo "==> Waiting for services to start..."
            sleep 3

            echo "==> Checking service status..."
            systemctl is-active vpa-backend || (journalctl -u vpa-backend -n 20 && exit 1)
            systemctl is-active vpa-frontend || (journalctl -u vpa-frontend -n 20 && exit 1)

            echo "==> Deploy complete."
